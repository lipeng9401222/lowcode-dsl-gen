# Epoint 工作流 yml 模板
# 字段全小写命名；activity/transition 数组直接平铺，不再多一层 WorkflowActivity 包装
# 必含 5 类节点：开始(10) + 申请(30) + 审批(30) + 结束(20) + 浏览(100)
# 红线：开始节点不能填表单；申请节点必须独立；开始/结束/浏览节点的 handleurl/multitransactormode/timelimit*/earlywarning_*/isallowaddattachfile 等字段为空(null)

# 全局固定标识
type: workflow

# 流程根
workFlow:

  # 流程基本信息（1 个流程仅 1 条）
  workflowProcess:
    processguid: {{PROCESS_GUID}}
    processname: "{{PROCESS_NAME}}"
    note: "{{PROCESS_NAME}}"
    isvue: 0
    designversion: senior
    ordernum: 50
    status: 10
    tag: '20'
    isnewversion: null
    customtype: null
    cansimpledisplay: null
    statemachinetag: null
    appguid: null
    baseouguid: null
    tenantguid: ''

  # 流程版本结构（1 个流程对应 1 个启用版本）
  workflowVersion:

    # 活动数组：开始 + 申请 + 审批... + 结束 + 浏览
    activity:

      # 1. 开始节点（activitytype=10）：纯启动，不能填表单
      - activityguid: {{ACTIVITY_START_GUID}}
        activityname: "开始"
        activitydispname: "开始"
        processversionguid: {{PROCESS_VERSION_GUID}}
        activitytype: 10
        splittype: 30
        jointype: null
        multitransactormode: null
        handleurl: null
        mobilehandleurl: null
        isallowaddattachfile: null
        timelimitenable: null
        timelimit: -1.0
        timelimitunit: 55
        earlywarning_enable: null
        earlywarning_time: -1.0
        earlywarning_timeunit: 55
        isPassWhenNoTransactor: null
        isLockWhenMultiTransactor: 0
        mobileHandleType: app
        iconx: '-159'
        icony: '123'
        vmlid: -1
        note: "流程开始"
        workflowActivityOperation:
          - operationguid: {{OPERATION_START_SUBMIT_GUID}}
            activityguid: {{ACTIVITY_START_GUID}}
            processversionguid: {{PROCESS_VERSION_GUID}}
            operationname: "送下一步"
            operationtype: 10
            is_requireopinion: 20
            is_checkmaterialsubmit: 20
            is_showoperationpage: 0
            operationvisiablecase: '10'
            is_shownextactivity: 1
            is_ShowOpinionTemplete: 0
            ordernumber: 0

      # 2. 申请节点（activitytype=30，独立于开始节点）：填报提交，必须绑表单
      - activityguid: {{ACTIVITY_APPLY_GUID}}
        activityname: "申请"
        activitydispname: "申请"
        processversionguid: {{PROCESS_VERSION_GUID}}
        activitytype: 30
        splittype: 30
        jointype: 30
        multitransactormode: 10
        handleurl: "[#=FirstMaterialUrl#]"
        mobilehandleurl: "[#=FirstMaterialUrl#]"
        isallowaddattachfile: 20
        timelimitenable: 20
        timelimit: -1.0
        timelimitunit: 55
        earlywarning_enable: 20
        earlywarning_time: -1.0
        earlywarning_timeunit: 55
        isPassWhenNoTransactor: 20
        isLockWhenMultiTransactor: 0
        mobileHandleType: app
        iconx: '26.5'
        icony: '99'
        vmlid: 2
        note: "申请人填写并提交申请信息"
        workflowActivityOperation:
          - operationguid: {{OPERATION_APPLY_SUBMIT_GUID}}
            activityguid: {{ACTIVITY_APPLY_GUID}}
            processversionguid: {{PROCESS_VERSION_GUID}}
            operationname: "送下一步"
            operationtype: 10
            is_requireopinion: 10
            is_checkmaterialsubmit: 10
            is_showoperationpage: 1
            operationvisiablecase: '10'
            is_shownextactivity: 1
            is_ShowOpinionTemplete: 0
            ordernumber: 0
            stateLevel: 10                # 主按钮（蓝色），可选

      # 3. 审批节点（activitytype=30）：可有多个；含通过 + 退回两个按钮
      - activityguid: {{ACTIVITY_APPROVE_GUID}}
        activityname: "审批"
        activitydispname: "审批"
        processversionguid: {{PROCESS_VERSION_GUID}}
        activitytype: 30
        splittype: 30
        jointype: 30
        multitransactormode: 10
        handleurl: "[#=FirstMaterialUrl#]"
        mobilehandleurl: "[#=FirstMaterialUrl#]"
        isallowaddattachfile: 20
        timelimitenable: 20
        timelimit: -1.0
        timelimitunit: 55
        earlywarning_enable: 20
        earlywarning_time: -1.0
        earlywarning_timeunit: 55
        isPassWhenNoTransactor: 20
        isLockWhenMultiTransactor: 0
        mobileHandleType: app
        iconx: '345.5'
        icony: '99'
        vmlid: 3
        nopasshandlevalue: '10'
        note: "审批人审核"
        workflowActivityOperation:
          - operationguid: {{OPERATION_APPROVE_PASS_GUID}}
            activityguid: {{ACTIVITY_APPROVE_GUID}}
            processversionguid: {{PROCESS_VERSION_GUID}}
            operationname: "送下一步"
            operationtype: 10
            is_requireopinion: 10
            is_checkmaterialsubmit: 20
            is_showoperationpage: 1
            operationvisiablecase: '10'
            is_shownextactivity: 1
            is_ShowOpinionTemplete: 0
            ordernumber: 0
            stateLevel: 10                # 主按钮（蓝色），可选
          - operationguid: {{OPERATION_APPROVE_REJECT_GUID}}
            activityguid: {{ACTIVITY_APPROVE_GUID}}
            processversionguid: {{PROCESS_VERSION_GUID}}
            operationname: "退回"
            operationtype: 30
            is_requireopinion: 10
            is_checkmaterialsubmit: 20
            is_showoperationpage: 1
            operationvisiablecase: '1020'
            is_shownextactivity: 0
            backtargetscope: '1'
            targetactivity: "[#=AllBeforeActivity#]"
            multiTransctorMode: OR
            is_ShowOpinionTemplete: 0
            ordernumber: 1
            stateLevel: 30                # 危险按钮（红色），可选

      # 4. 结束节点（activitytype=20）
      - activityguid: {{ACTIVITY_END_GUID}}
        activityname: "结束"
        activitydispname: "结束"
        processversionguid: {{PROCESS_VERSION_GUID}}
        activitytype: 20
        splittype: null
        jointype: 30
        multitransactormode: null
        handleurl: null
        mobilehandleurl: null
        isallowaddattachfile: null
        timelimitenable: null
        timelimit: -1.0
        timelimitunit: 55
        earlywarning_enable: null
        earlywarning_time: -1.0
        earlywarning_timeunit: 55
        isPassWhenNoTransactor: null
        isLockWhenMultiTransactor: 0
        mobileHandleType: app
        iconx: '665'
        icony: '123'
        vmlid: 1
        note: "流程结束"

      # 5. 浏览节点（activitytype=100，孤立节点，位置置于流程上方）
      - activityguid: {{ACTIVITY_BROWSE_GUID}}
        activityname: "浏览"
        activitydispname: "浏览"
        processversionguid: {{PROCESS_VERSION_GUID}}
        activitytype: 100
        splittype: 30
        jointype: null
        multitransactormode: null
        handleurl: "[#=FirstMaterialUrl#]"
        mobilehandleurl: "[#=FirstMaterialUrl#]"
        isallowaddattachfile: null
        timelimitenable: null
        timelimit: -1.0
        timelimitunit: 55
        earlywarning_enable: null
        earlywarning_time: -1.0
        earlywarning_timeunit: 55
        isPassWhenNoTransactor: null
        isLockWhenMultiTransactor: 0
        mobileHandleType: view
        iconx: '253'
        icony: '-20'
        vmlid: -2
        note: "已办流程浏览"

    # 退回按钮关联配置（1 个退回按钮 → 1 条）
    workflowConfig:
      - rowguid: {{CONFIG_REJECT_GUID}}
        processversionguid: {{PROCESS_VERSION_GUID}}
        belongto: 22
        configname: backTargetScope
        configvalue: '1'
        sourceguid: {{OPERATION_APPROVE_REJECT_GUID}}

    # 流程版本材料（1 个流程 1 个表单）
    workflowPvMaterial:
      - materialguid: {{MATERIAL_GUID}}
        processversionguid: {{PROCESS_VERSION_GUID}}
        materialname: "{{MATERIAL_NAME}}"
        type: 10
        status: 10
        submittype: 10
        pageurl_read: "{{MATERIAL_PAGE_URL_READ}}"
        pageurl_readandwrite: "{{MATERIAL_PAGE_URL_READANDWRITE}}"
        mobilepageurl_read: "{{MATERIAL_MOBILE_URL_READ}}"
        mobilepageurl_readandwrite: "{{MATERIAL_MOBILE_URL_READANDWRITE}}"

    # 表单数据表映射（1 个表单 1 条）
    workflowPvMisTableSet:
      - mistablesetguid: {{MISTABLESET_GUID}}
        processversionguid: {{PROCESS_VERSION_GUID}}
        materialguid: {{MATERIAL_GUID}}
        tableguid: {{TABLE_GUID}}
        tableid: {{TABLE_ID}}
        sql_tablename: "{{SQL_TABLENAME}}"

    # [可选] 相关数据 / 流程上下文参数（工作流扩展，用于流转条件中引用业务字段）
    # 真实示例（来源方式 30=表单字段，定义"金额"参数供条件分支使用）：
    # workflowContext:
    #   - fieldguid: {{CONTEXT_FIELD_GUID}}
    #     fieldName: "jine"
    #     note: "金额"
    #     fieldType: 10                 # 10=字符 / 20=整形 / 30=数字 / 40=时间 / 50=布尔
    #     valueSource: 30               # 30=表单字段 / 10=直接赋值 / 20=方法获取
    #     fromMaterialGuid: {{MATERIAL_GUID}}
    #     fromMisTableId: '{{TABLE_ID}}'
    #     fromFieldId: '1707'
    #     fromFieldName: "jine"
    #     fieldValue: '[#=EPOINTFORM({{SQL_TABLENAME}},jine,10)#]'
    #     belongTo: 10
    #     processversionguid: {{PROCESS_VERSION_GUID}}

    # [可选] 外部方法（工作流扩展，用于流程中调用业务逻辑）
    # 真实示例（更新业务表状态字段）：
    # method:
    #   - methodGuid: {{METHOD_GUID}}
    #     processversionguid: {{PROCESS_VERSION_GUID}}
    #     dllpath: ''
    #     typename: "com.epoint.xxx.workflow.ExternalMethods"
    #     methodname: "updateRecordStatus"
    #     returnvaluetype: "Void"
    #     note: "更新为待审核状态"
    #     ordernum: 0
    #     workflowMethodParameter:
    #       # 工作流上下文参数
    #       - mpGuid: {{MP_CONTEXT_GUID}}
    #         methodGuid: {{METHOD_GUID}}
    #         mpname: "context"
    #         mptype: 100               # 100=对象类型
    #         mpvalue: "[#=ExecutionContext#]"
    #         encrypt: '0'
    #         processversionguid: {{PROCESS_VERSION_GUID}}
    #         orderNum: 50
    #         mpnamedescription: "上下文对象参数"
    #       # 常量参数
    #       - mpGuid: {{MP_STATUS_GUID}}
    #         methodGuid: {{METHOD_GUID}}
    #         mpname: "status"
    #         mptype: 10
    #         mpvalue: "2"
    #         encrypt: '0'
    #         processversionguid: {{PROCESS_VERSION_GUID}}
    #         orderNum: 51

    # [可选] 事件配置（工作流扩展，挂在活动实例 / 操作前后的钩子）
    # 真实示例（送下一步按钮操作后调用 method 更新状态）：
    # workflowEvent:
    #   - eventGuid: {{EVENT_GUID}}
    #     eventName: "更新状态字段（送下一步按钮操作后处理）"
    #     belongTo: 22                  # 22=活动操作 / 20=活动实例
    #     eventType: 55                 # 55=操作后 / 50=操作前 / 25=活动完成后
    #     sourceGuid: {{OPERATION_APPROVE_PASS_GUID}}   # 22 时填按钮 GUID；20 时填活动 GUID
    #     processversionguid: {{PROCESS_VERSION_GUID}}
    #     syncType: 0                   # 0=同步 / 1=异步
    #     orderNumber: 100
    #     eventMethodGuid: {{METHOD_GUID}}

    # 节点流转关系（开始→申请→审批→...→结束，浏览节点孤立不参与流转）
    transition:
      # 开始 → 申请（transitionname 固定为"申请"）
      - transitionguid: {{TRANSITION_START_TO_APPLY_GUID}}
        processversionguid: {{PROCESS_VERSION_GUID}}
        fromactivityguid: {{ACTIVITY_START_GUID}}
        toactivityguid: {{ACTIVITY_APPLY_GUID}}
        transitionname: "申请"
        transitiondispname: "申请"
        is_sendtomessagecenter: 10
        priority: 60
        type: 10
        targetActivityTransactorSource: 10
        is_targettransactor_editable: 10
        isDefault: 20
        is_showasoperationbutton: 20
        vmlid: 2

      # 申请 → 审批
      - transitionguid: {{TRANSITION_APPLY_TO_APPROVE_GUID}}
        processversionguid: {{PROCESS_VERSION_GUID}}
        fromactivityguid: {{ACTIVITY_APPLY_GUID}}
        toactivityguid: {{ACTIVITY_APPROVE_GUID}}
        transitionname: "审批"
        transitiondispname: "审批"
        is_sendtomessagecenter: 10
        priority: 60
        type: 10
        targetActivityTransactorSource: 10
        is_targettransactor_editable: 10
        isDefault: 20
        is_showasoperationbutton: 20
        vmlid: 3

      # 审批 → 结束
      - transitionguid: {{TRANSITION_APPROVE_TO_END_GUID}}
        processversionguid: {{PROCESS_VERSION_GUID}}
        fromactivityguid: {{ACTIVITY_APPROVE_GUID}}
        toactivityguid: {{ACTIVITY_END_GUID}}
        transitionname: "结束"
        transitiondispname: "结束"
        is_sendtomessagecenter: 10
        priority: 60
        type: 10
        targetActivityTransactorSource: 10
        is_targettransactor_editable: 10
        isDefault: 20
        is_showasoperationbutton: 20
        vmlid: 4

    # 流程版本详情（1 个流程 1 条）
    workflowProcessVersion:
      processversionguid: {{PROCESS_VERSION_GUID}}
      processguid: {{PROCESS_GUID}}
      processversionname: "{{PROCESS_NAME}}"
      version: V1
      status: 10
      designversion: senior
      direction: '90'
      createdate: "{{CREATE_DATE}}"
      updatedate: "{{UPDATE_DATE}}"
      author: "{{AUTHOR_GUID}}"
      # 工作流扩展字段
      isShowLineGraph: Normal
      isShowNodeSimple: details
      revokeOption: 20
      revokeAllowDay: 0
      revokeRemindOption: 20
      noParticipatorOption: 10
