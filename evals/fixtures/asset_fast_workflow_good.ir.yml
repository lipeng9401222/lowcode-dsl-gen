open_questions:
  - id: "q-mode"
    target: "task"
    field: "task.mode"
    severity: "confirm"
    question: "本次是只在现有 ipdmanage 应用下生成 workflow，还是生成完整应用？"
    options: ["只生成 workflow", "生成完整应用", "仅生成计划"]
    recommended: "只生成 workflow"
    status: "resolved"
    answer: "只生成 workflow"
    resolvedValue: "asset-fast"
  - id: "q-wf-effect"
    target: "asset-workflow-001"
    field: "workflow.confirmations"
    severity: "blocking"
    question: "请确认请假流程目标、节点链路、处理人、条件分支、字段权限、会签/超时和状态联动范围。"
    options: ["按当前基础审批流生成", "需要补充分支/权限/联动"]
    recommended: "按当前基础审批流生成"
    status: "resolved"
    answer: "按当前基础审批流生成"
    resolvedValue:
      processGoal: "请假申请审批"
      activityChain: ["申请", "直接领导审批"]
      transactors: "直接领导审批按指定处理人"
      conditions: "not_required"
      fieldPermissions: "not_required"
      approvePassRate: "not_required"
      timeout: "not_required"
      eventLinkage: "not_required"
