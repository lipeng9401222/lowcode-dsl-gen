        - name: "申请"
          type: "apply"
        - name: "部门经理审批"
          type: "approve"
          transactorSource: "assignee"
      contexts: []
      conditions: []
      methods: []
      events: []
      activityMaterials: []
      activityExtra: []
      approvePassRate: []
