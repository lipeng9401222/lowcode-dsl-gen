version: "1.0"
task:
  mode: "asset-fast"
  requestedAssetTypes: ["event", "workflow"]
  sources:
    mode: "user_confirmed"
  sourceDetails:
    mode:
      questionId: "q-mode"
      answer: "同时生成采购立项审批 workflow 和审批后状态联动 event"
application:
  apptag: "purchaseproject"
  applicationname: "采购立项"
  developerstag: "epoint"
  kitid: "businessprocess"
  tenantguid: ""
  baseouguid: ""
  categories: []
  sources:
    developerstag: "repo_inferred"
    kitid: "repo_inferred"
    tenantguid: "safe_default"
    baseouguid: "safe_default"
    categories: "repo_inferred"
  sourceDetails:
    developerstag:
      repoEvidence: { path: "src/main/resources/META-INF/resources/epoint/purchaseproject/appinfo.lowcode.yml" }
    kitid:
      repoEvidence: { path: "src/main/resources/META-INF/resources/epoint/purchaseproject/appinfo.lowcode.yml" }
    categories:
      repoEvidence: { path: "src/main/resources/META-INF/resources/epoint/purchaseproject" }
